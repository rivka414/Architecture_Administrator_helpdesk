<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Damage Reports</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav>
      <h1>Damage Reports</h1>
      <div id="navUserSection" class="hidden">
        <span id="navUserName"></span>
        <button id="logoutButton">Logout</button>
      </div>
    </nav>
    <main>
      <div id="loginScreen" class="card">
        <h2>Login</h2>
        <div id="loginError" class="login-error"></div>
        <form id="loginForm">
          <div>
            <label>Username</label>
            <input id="loginUsername" type="text" required autocomplete="off" />
          </div>
          <div>
            <label>Password</label>
            <input id="loginPassword" type="password" required />
          </div>
          <button type="submit">Login</button>
        </form>
        <div class="form-section" style="margin-top:1.5rem;">
          <strong>Available Users:</strong>
          <table class="user-ref-table">
            <thead><tr><th>Name</th><th>Username</th><th>Password</th><th>Role</th><th>Settlement</th></tr></thead>
            <tbody id="userRefTableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="listScreen" class="card">
        <h2>Reports List</h2>
        <div class="toolbar">
          <button id="createButton">Create Report</button>
          <button id="messageCenterButton" class="btn-secondary">Message Center</button>
          <button id="appraisersPortalButton" class="btn-secondary">Appraisers Portal</button>
          <button id="localAuthorityPortalButton" class="btn-secondary">Local Authority Portal</button>
          <button id="settlementProcessesButton" class="btn-secondary">Settlement Processes</button>
          <button id="systemHealthButton" class="btn-secondary">System Health</button>
        </div>
        <div class="filter-bar">
          <label><input type="checkbox" id="waitingFilter" /> Show only buildings waiting in line for work</label>
          <label><input type="checkbox" id="budgetReadyFilter" /> Show only buildings ready for budget release</label>
          <label>
            <select id="settlementFilter">
              <option value="">All Settlements</option>
            </select>
          </label>
          <button id="batchGenerateButton">Generate occupancy files for all eligible buildings</button>
        </div>
        <div id="settlementSummary" class="hidden"></div>
        <div id="reportList"></div>
      </div>

      <div id="createScreen" class="card hidden">
        <h2>Create Report</h2>
        <form id="createForm">
          <div>
            <label>Reporter Name</label>
            <input name="reporterName" required />
          </div>
          <div>
            <label>Address</label>
            <input name="address" required />
          </div>
          <div>
            <label>Damage Type</label>
            <input name="damageType" required />
          </div>
          <div>
            <label>Description</label>
            <textarea name="description" required></textarea>
          </div>
          <div>
            <label>Damage photos exist</label>
            <select name="damagePhotosExist"><option value="true">Yes</option><option value="false">No</option></select>
          </div>
          <div>
            <label>Engineer report exists</label>
            <select name="engineerReportExists"><option value="true">Yes</option><option value="false">No</option></select>
          </div>
          <div>
            <label>Eligibility check performed</label>
            <select name="eligibilityCheckPerformed"><option value="true">Yes</option><option value="false">No</option></select>
          </div>
          <div>
            <label>Social approval</label>
            <select name="socialApproval"><option value="true">Yes</option><option value="false">No</option></select>
          </div>
          <div>
            <label>Apartments in building</label>
            <input name="apartmentsInBuilding" type="number" min="0" value="0" />
          </div>
          <div>
            <label>Family Email</label>
            <input name="familyEmail" type="email" />
          </div>
          <div class="form-actions">
            <button type="submit">Save Report</button>
            <button type="button" id="cancelCreate" class="btn-secondary">Cancel</button>
          </div>
        </form>
      </div>

      <div id="detailsScreen" class="card hidden">
        <h2>Report Details</h2>
        <div id="detailsContent"></div>
        <div style="margin-top:1rem; display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;">
          <label style="font-weight:500; font-size:0.85rem; color:#475569;">Status</label>
          <select id="statusSelect"></select>
          <button id="saveStatusButton">Update Status</button>
          <button id="backButton" class="btn-secondary">Back</button>
        </div>
        <div id="actionHistorySection" class="action-history hidden">
          <h3>Action History</h3>
          <div id="actionHistoryList"></div>
        </div>
      </div>

      <div id="messageCenterScreen" class="card hidden">
        <h2>Message Center</h2>
        <div class="notification-mode-bar">
          <label>Notification Server Status:</label>
          <select id="notificationModeSelect">
            <option value="success">Success</option>
            <option value="always_fail">Always Fail</option>
            <option value="fail_first">Fail First Attempt</option>
            <option value="random">Random Failure (~30%)</option>
            <option value="timeout">Response Lost (Timeout)</option>
          </select>
          <span id="notificationModeIndicator"></span>
        </div>
        <div id="notificationsList"></div>
        <button id="backFromMessageCenter" class="btn-secondary" style="margin-top:1rem;">Back to Reports</button>
      </div>

      <div id="appraisersPortalScreen" class="card hidden">
        <h2>Appraisers Portal</h2>
        <div id="appraisersPortalList"></div>
        <div id="appraisalForm" class="form-section hidden">
          <h3>Damage Assessment</h3>
          <p id="appraisalBuildingInfo"></p>
          <div style="margin-top:0.75rem;">
            <label>Damage Level</label>
            <select id="appraisalDamageLevel">
              <option value="light">Light</option>
              <option value="medium">Medium</option>
              <option value="severe">Severe</option>
            </select>
          </div>
          <div>
            <label>Appraiser Comments</label>
            <textarea id="appraisalComments" rows="4"></textarea>
          </div>
          <div>
            <label>Inspection Date</label>
            <input id="appraisalDate" type="date" />
          </div>
          <div class="form-checkbox">
            <input id="appraisalReinspection" type="checkbox" />
            <label for="appraisalReinspection">Re-inspection required</label>
          </div>
          <div class="form-actions">
            <button id="saveAppraisalButton">Save Assessment</button>
            <button id="cancelAppraisalButton" class="btn-secondary">Cancel</button>
          </div>
        </div>
        <button id="backFromAppraisersPortal" class="btn-secondary" style="margin-top:1rem;">Back to Reports</button>
      </div>

      <div id="localAuthorityPortalScreen" class="card hidden">
        <h2>Local Authority Portal</h2>
        <div id="localAuthorityPortalList"></div>
        <div id="permitApprovalForm" class="form-section hidden">
          <h3>Infrastructure Readiness Confirmation</h3>
          <p id="permitBuildingInfo"></p>
          <div style="margin-top:0.75rem;">
            <div class="form-checkbox">
              <input id="permitWaterSupply" type="checkbox" />
              <label for="permitWaterSupply">Proper water supply</label>
            </div>
            <div class="form-checkbox">
              <input id="permitElectricitySupply" type="checkbox" />
              <label for="permitElectricitySupply">Proper electricity supply</label>
            </div>
            <div class="form-checkbox">
              <input id="permitAccessRoads" type="checkbox" />
              <label for="permitAccessRoads">Open access roads</label>
            </div>
            <div class="form-checkbox">
              <input id="permitEnvironmentalCleared" type="checkbox" />
              <label for="permitEnvironmentalCleared">Environmental hazards have been cleared</label>
            </div>
          </div>
          <div>
            <label>Local Authority Comments</label>
            <textarea id="permitComments" rows="4"></textarea>
          </div>
          <div class="form-checkbox">
            <input id="permitApproved" type="checkbox" />
            <label for="permitApproved">Local authority approval</label>
          </div>
          <div class="form-actions">
            <button id="savePermitApprovalButton">Save</button>
            <button id="cancelPermitApprovalButton" class="btn-secondary">Cancel</button>
          </div>
        </div>
        <button id="backFromLocalAuthorityPortal" class="btn-secondary" style="margin-top:1rem;">Back to Reports</button>
      </div>

      <div id="settlementProcessesScreen" class="card hidden">
        <h2>Settlement Processes</h2>
        <div id="settlementProcessesList"></div>
        <button id="backFromSettlementProcesses" class="btn-secondary" style="margin-top:1rem;">Back to Reports</button>
      </div>

      <div id="systemHealthScreen" class="card hidden">
        <h2>System Health</h2>
        <div id="systemHealthContent"></div>
        <button id="backFromSystemHealth" class="btn-secondary" style="margin-top:1rem;">Back to Reports</button>
      </div>
    </main>

    <div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target === this) hideModal()">
      <div class="modal">
        <div id="modalContent"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
